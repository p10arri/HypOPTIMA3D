space:
  name: hyperbolic
  curvature: 0.1
  clip_radius: 2.3
  thau: 0.2
model:
  name: vit3d
  patch_size: 16
  embed_dim: 768
  depth: 12
  num_heads: 12
  mlp_ratio: 4.0
  qkv_bias: true
  qk_scale: null
  use_grad_checkpoint: true
  drop_rate: 0.1
  attn_drop_rate: 0.0
  drop_path_rate: 0.1
  dropout: 0.1
  skip_class_head: false
  pretrained: false
  checkpoint_path: null
augmentations:
  name: heavy
  _transform_class_: HeavyTrainTransform
  transform_size: ${hydra:data.image_size}
experiment: hyperbolic_heavy_contrastive_ClassToken
fast_dev_run: false
seed: 42
grad_clip: 1.0
device: cuda
training_mode: contrastive
data:
  dataset: nineclasses3D
  image_size: 224
  batch_size: 32
  num_workers: 4
  pin_memory: true
  num_classes: 9
  sampling:
    name: unique
    m_per_class: 1
optimizer:
  lr: 0.0001
  weight_decay: 0.05
  warmup_epochs: 15
trainer:
  epochs: 100
  eval_frequency: 5
  early_stopping_patience: 30
  resume_from: null
results_path: results/
model_path: ${hydra:run.dir}/models
logs_path: ${hydra:run.dir}/logs
wandb:
  project: HypOPTIMA3D
  entity: pdarri97-johannes-kepler-universit-t-linz
  run_name: ${experiment}
  mode: online
  notes: ${hydra:job.override_dirname}
  resume: allow
